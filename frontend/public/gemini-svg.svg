<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Neon "AI Intelligence" Gradient -->
    <linearGradient id="aiNeon" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFCC" />
      <stop offset="100%" stop-color="#00A2FF" />
    </linearGradient>
    
    <!-- Code Bracket Sleek Gradient -->
    <linearGradient id="codeBrace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF" />
      <stop offset="100%" stop-color="#A0AEC0" />
    </linearGradient>
  </defs>

  <!-- The "C" Shape / Code Bracket Wrapper -->
  <path d="M14 6 L6 6 L6 26 L14 26" fill="none" stroke="url(#codeBrace)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The Terminal Prompt & AI Spark Combo -->
  <!-- Looks like ">" but the top half morphs into an intelligent spark node -->
  <path d="M12 11 L19 16 L12 21" fill="none" stroke="url(#aiNeon)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- The Blinking AI Cursor / Neural Node -->
  <rect x="22" y="19" width="5" height="3" fill="#00FFCC" rx="1">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" />
  </rect>

  <!-- Small floating data bit showing activity -->
  <circle cx="21" cy="9" r="1.5" fill="#00A2FF" />
</svg>
